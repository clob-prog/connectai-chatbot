<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>CO:ON AI – 대화 코치</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --pink: #E8829A;
    --pink-light: #FFE4EC;
    --blue: #9B8EC4;
    --bubble-bot: #ffffff;
    --bubble-user: #9B8EC4;
    --bg: #F2F2F7;
    --nav-bg: #ffffff;
    --input-bg: #F2F2F7;
    --text: #1c1c1e;
    --text-muted: #8e8e93;
    --border: rgba(0,0,0,0.08);
    --green: #34C759;
    --red-light: #FFF0F0;
    --red: #C0392B;
  }

  html, body {
    height: 100%;
    font-family: 'Nunito', -apple-system, BlinkMacSystemFont, sans-serif;
    background: linear-gradient(145deg, #FFE4EC 0%, #E8F4FF 100%);
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
  }

  /* ── 스마트폰 프레임 ── */
  .phone-frame {
    width: 375px;
    height: 780px;
    background: #1a1a1a;
    border-radius: 52px;
    padding: 14px;
    box-shadow:
      0 0 0 1px #333,
      0 40px 80px rgba(0,0,0,0.35),
      inset 0 0 0 1px #444;
    position: relative;
    flex-shrink: 0;
  }

  .phone-frame::before {
    content: '';
    position: absolute;
    top: 14px; left: 50%;
    transform: translateX(-50%);
    width: 120px; height: 30px;
    background: #1a1a1a;
    border-radius: 0 0 18px 18px;
    z-index: 10;
  }

  .screen {
    width: 100%;
    height: 100%;
    background: var(--bg);
    border-radius: 40px;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    position: relative;
  }

  /* ── 상태바 ── */
  .status-bar {
    background: var(--nav-bg);
    padding: 16px 24px 8px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 12px;
    font-weight: 700;
    color: var(--text);
    flex-shrink: 0;
    padding-top: 44px;
  }

  .status-icons { display: flex; align-items: center; gap: 5px; }
  .signal { display: flex; align-items: flex-end; gap: 2px; }
  .signal span { width: 3px; background: var(--text); border-radius: 1px; }
  .signal span:nth-child(1) { height: 5px; }
  .signal span:nth-child(2) { height: 8px; }
  .signal span:nth-child(3) { height: 11px; }
  .battery {
    width: 22px; height: 11px;
    border: 1.5px solid var(--text);
    border-radius: 2px;
    position: relative;
    display: flex; align-items: center; padding: 1.5px;
  }
  .battery::after {
    content: '';
    position: absolute;
    right: -4px; top: 50%;
    transform: translateY(-50%);
    width: 2px; height: 5px;
    background: var(--text);
    border-radius: 0 1px 1px 0;
  }
  .battery-fill { background: var(--text); border-radius: 1px; flex: 0.8; height: 100%; }

  /* ── 네비게이션 ── */
  .nav-bar {
    background: var(--nav-bg);
    border-bottom: 0.5px solid var(--border);
    padding: 10px 16px 14px;
    display: flex;
    align-items: center;
    gap: 12px;
    flex-shrink: 0;
  }

  .bot-avatar {
    width: 40px; height: 40px;
    border-radius: 50%;
    background: linear-gradient(135deg, #E8829A, #9B8EC4);
    display: flex; align-items: center; justify-content: center;
    font-size: 20px;
    flex-shrink: 0;
    box-shadow: 0 2px 8px rgba(232,130,154,0.4);
  }

  .bot-info { flex: 1; }
  .bot-name { font-size: 15px; font-weight: 800; color: var(--text); }
  .bot-status { font-size: 12px; color: var(--green); font-weight: 600; }

  .nav-reset {
    font-size: 12px; color: var(--blue);
    cursor: pointer; font-weight: 600;
    padding: 4px 8px;
    border-radius: 8px;
    transition: background 0.15s;
  }
  .nav-reset:hover { background: rgba(0,122,255,0.08); }

  /* ── 채팅 영역 ── */
  .chat-area {
    flex: 1;
    overflow-y: auto;
    padding: 16px 12px;
    display: flex;
    flex-direction: column;
    gap: 6px;
    scroll-behavior: smooth;
  }

  .chat-area::-webkit-scrollbar { width: 3px; }
  .chat-area::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.1); border-radius: 2px; }

  .msg { max-width: 80%; display: flex; flex-direction: column; gap: 3px; }
  .msg.bot { align-self: flex-start; }
  .msg.user { align-self: flex-end; }

  .bubble {
    padding: 10px 14px;
    border-radius: 20px;
    font-size: 14px;
    line-height: 1.55;
    font-weight: 600;
    word-break: break-word;
    animation: popIn 0.2s cubic-bezier(0.34,1.56,0.64,1);
  }

  @keyframes popIn {
    from { opacity: 0; transform: scale(0.85) translateY(6px); }
    to { opacity: 1; transform: scale(1) translateY(0); }
  }

  .msg.bot .bubble {
    background: var(--bubble-bot);
    color: var(--text);
    border-bottom-left-radius: 5px;
    box-shadow: 0 1px 4px rgba(0,0,0,0.07);
  }
  .msg.user .bubble {
    background: var(--bubble-user);
    color: #fff;
    border-bottom-right-radius: 5px;
  }
  .msg.error .bubble {
    background: var(--red-light);
    color: var(--red);
    border: 1px solid #FFCDD2;
    font-size: 12px;
    border-bottom-left-radius: 5px;
  }

  .msg-time {
    font-size: 10px;
    color: var(--text-muted);
    padding: 0 4px;
    font-weight: 600;
  }
  .msg.user .msg-time { text-align: right; }

  /* ── 타이핑 ── */
  .typing-wrap { align-self: flex-start; }
  .typing {
    display: inline-flex; align-items: center; gap: 4px;
    padding: 12px 16px;
    background: var(--bubble-bot);
    border-radius: 20px; border-bottom-left-radius: 5px;
    box-shadow: 0 1px 4px rgba(0,0,0,0.07);
  }
  .dot {
    width: 7px; height: 7px;
    background: #c7c7cc; border-radius: 50%;
    animation: bounce 1.2s infinite;
  }
  .dot:nth-child(2) { animation-delay: 0.2s; }
  .dot:nth-child(3) { animation-delay: 0.4s; }
  @keyframes bounce {
    0%,60%,100% { transform: translateY(0); }
    30% { transform: translateY(-6px); }
  }

  /* ── 입력창 ── */
  .input-bar {
    background: var(--nav-bg);
    border-top: 0.5px solid var(--border);
    padding: 10px 12px 24px;
    display: flex; align-items: center; gap: 8px;
    flex-shrink: 0;
  }

  .msg-input {
    flex: 1;
    background: var(--input-bg);
    border: none;
    border-radius: 22px;
    padding: 9px 16px;
    font-size: 14px;
    font-family: inherit;
    font-weight: 600;
    color: var(--text);
    outline: none;
    transition: box-shadow 0.2s;
  }
  .msg-input:focus { box-shadow: 0 0 0 2px rgba(0,122,255,0.25); }
  .msg-input::placeholder { color: var(--text-muted); font-weight: 600; }

  .send-btn {
    width: 34px; height: 34px;
    border-radius: 50%;
    background: var(--blue);
    border: none; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    transition: transform 0.15s, opacity 0.15s;
    box-shadow: 0 2px 8px rgba(155,142,196,0.4);
  }
  .send-btn:hover { transform: scale(1.08); }
  .send-btn:active { transform: scale(0.94); }
  .send-btn:disabled { opacity: 0.4; cursor: default; transform: none; }
  .send-btn svg { width: 16px; height: 16px; fill: #fff; }

  /* ── API 설정 화면 ── */
  #setup-screen {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 24px 20px;
    gap: 14px;
  }

  .setup-icon {
    width: 72px; height: 72px;
    border-radius: 22px;
    background: linear-gradient(135deg, var(--pink), #FF8E53);
    display: flex; align-items: center; justify-content: center;
    font-size: 36px;
    box-shadow: 0 8px 24px rgba(155,142,196,0.4);
    margin-bottom: 4px;
  }

  .setup-title { font-size: 20px; font-weight: 800; color: var(--text); text-align: center; }
  .setup-desc { font-size: 13px; color: var(--text-muted); text-align: center; line-height: 1.6; font-weight: 600; }

  .api-input {
    width: 100%;
    border: 1.5px solid var(--border);
    border-radius: 12px;
    padding: 11px 14px;
    font-size: 13px;
    font-family: inherit;
    font-weight: 600;
    color: var(--text);
    background: #fff;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  .api-input:focus {
    border-color: var(--blue);
    box-shadow: 0 0 0 3px rgba(0,122,255,0.12);
  }

  .api-btn {
    width: 100%;
    background: var(--blue);
    color: #fff;
    border: none;
    border-radius: 14px;
    padding: 13px;
    font-size: 15px;
    font-weight: 800;
    cursor: pointer;
    font-family: inherit;
    transition: opacity 0.15s, transform 0.15s;
    box-shadow: 0 4px 16px rgba(155,142,196,0.35);
  }
  .api-btn:hover { opacity: 0.9; }
  .api-btn:active { transform: scale(0.98); }

  .setup-link {
    font-size: 12px; color: var(--blue);
    text-align: center; font-weight: 700;
    text-decoration: none;
  }
  .setup-link:hover { text-decoration: underline; }

  .err-box {
    width: 100%;
    background: var(--red-light);
    border: 1px solid #FFCDD2;
    border-radius: 10px;
    padding: 10px 14px;
    font-size: 12px;
    color: var(--red);
    font-weight: 700;
    display: none;
    line-height: 1.5;
  }

  /* ── 날짜 구분선 ── */
  .date-divider {
    text-align: center;
    font-size: 11px;
    color: var(--text-muted);
    font-weight: 700;
    margin: 6px 0;
    letter-spacing: 0.3px;
  }
</style>
</head>
<body>

<div class="phone-frame">
  <div class="screen">

    <!-- 상태바 -->
    <div class="status-bar">
      <span>9:41</span>
      <div class="status-icons">
        <div class="signal">
          <span></span><span></span><span></span>
        </div>
        <span style="font-size:11px; font-weight:700;">WiFi</span>
        <div class="battery">
          <div class="battery-fill"></div>
        </div>
      </div>
    </div>

    <!-- API 설정 화면 -->
    <div id="setup-screen">
      <div class="setup-icon">💫</div>
      <div class="setup-title">CO:ON AI</div>
      <div class="setup-desc">자연스럽게 시작되는 연결 ✨<br>대화 코치 AI와 함께해요</div>
      <input class="api-input" id="api-key-input" type="text" placeholder="gsk_... (API 키 붙여넣기)" />
      <div class="err-box" id="setup-err"></div>
      <button class="api-btn" onclick="startChat()">시작하기 →</button>
      <a class="setup-link" href="https://console.groq.com" target="_blank">
        🔑 console.groq.com에서 무료 API 키 발급
      </a>
    </div>

    <!-- 채팅 화면 -->
    <div id="chat-screen" style="display:none; flex-direction:column; flex:1; overflow:hidden;">
      <div class="nav-bar">
        <div class="bot-avatar">🔵</div>
        <div class="bot-info">
          <div class="bot-name">CO:ON AI</div>
          <div class="bot-status">● 온라인</div>
        </div>
        <div class="nav-reset" onclick="resetChat()">재설정</div>
      </div>

      <div class="chat-area" id="chat-area">
        <div class="date-divider">오늘</div>
      </div>

      <div style="padding: 8px 12px 0; display:flex; gap:6px; overflow-x:auto; flex-shrink:0;">
        <button onclick="quickAsk('아이스브레이킹 질문 3가지 추천해줘')" style="white-space:nowrap; background:#F2F2F7; border:none; border-radius:16px; padding:6px 12px; font-size:12px; font-family:inherit; font-weight:700; color:#1c1c1e; cursor:pointer; flex-shrink:0;">💬 아이스브레이킹</button>
        <button onclick="quickAsk('대화 주제 추천해줘')" style="white-space:nowrap; background:#F2F2F7; border:none; border-radius:16px; padding:6px 12px; font-size:12px; font-family:inherit; font-weight:700; color:#1c1c1e; cursor:pointer; flex-shrink:0;">🗣️ 대화 주제</button>
        <button onclick="quickAsk('오늘 만남에 어울리는 옷차림 추천해줘')" style="white-space:nowrap; background:#F2F2F7; border:none; border-radius:16px; padding:6px 12px; font-size:12px; font-family:inherit; font-weight:700; color:#1c1c1e; cursor:pointer; flex-shrink:0;">👗 패션 추천</button>
        <button onclick="quickAsk('어색한 침묵이 흘렀을 때 어떻게 대화를 이어가면 좋을까?')" style="white-space:nowrap; background:#F2F2F7; border:none; border-radius:16px; padding:6px 12px; font-size:12px; font-family:inherit; font-weight:700; color:#1c1c1e; cursor:pointer; flex-shrink:0;">🤝 대화 코칭</button>
      </div>
      <div class="input-bar">
        <input class="msg-input" id="msg-input" type="text" placeholder="관심사나 상황을 알려주세요..." onkeydown="if(event.key==='Enter')sendMsg()" />
        <button class="send-btn" id="send-btn" onclick="sendMsg()">
          <svg viewBox="0 0 24 24"><path d="M2 21L23 12 2 3v7l15 2-15 2z"/></svg>
        </button>
      </div>
    </div>

  </div>
</div>

<script>
let apiKey = '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';
let history = []; // [{role:'user'|'assistant', content:'...'}]

const systemPrompt = `당신은 관심사 기반 소셜 네트워킹 앱의 AI 대화 코치입니다. 사용자가 새로운 사람과 자연스럽게 소통할 수 있도록 도와주는 역할을 합니다.

당신이 할 수 있는 것:
1. 아이스브레이킹 질문 추천: 상대방의 관심사를 바탕으로 처음 말 걸기 좋은 질문을 3가지 추천합니다
2. 대화 주제 추천: 공통 관심사나 상대 관심사를 기반으로 대화를 이어갈 수 있는 주제를 추천합니다
3. 패션 추천: 특정 관심사를 가진 상대를 만날 때 호감을 줄 수 있는 스타일/옷차림을 추천합니다
4. 대화 코칭: 어색한 상황에서 어떻게 대화를 이어갈지 구체적인 멘트와 방법을 알려줍니다

대화 흐름:
- 처음엔 상대방의 관심사가 무엇인지, 또는 내 관심사가 무엇인지 자연스럽게 물어봅니다
- 사용자가 요청하는 기능(아이스브레이킹/주제추천/패션추천/대화코칭)에 맞게 답변합니다
- 답변은 항상 구체적이고 실용적으로, 바로 써먹을 수 있게 합니다

규칙:
- 무조건 한국어로만 대화합니다. 영어 단어 한 글자도 절대 쓰지 않습니다. 한자, 아랍어, 일본어도 마찬가지입니다
- 예를 들어 "ice breaking" 대신 "아이스브레이킹", "style" 대신 "스타일"처럼 외래어는 한글 표기로만 씁니다
- 브랜드명이나 고유명사도 반드시 한글로 표기합니다
- 만약 외국어를 쓰고 싶다면 무조건 한글로 바꿔서 표현합니다
- 이모지는 절대 사용하지 않습니다
- 별표(*)나 마크다운 강조 기호는 절대 사용하지 않습니다
- 말투는 친근하고 부드럽게, 마치 친한 친구가 조언해주는 느낌으로 대화합니다. 딱딱하거나 공식적인 표현은 피합니다
- 답변은 너무 길지 않게, 핵심만 담아 전달합니다
- 아이스브레이킹 질문이나 대화 주제는 번호 목록으로 보기 좋게 제시합니다`;

function getTime() {
  return new Date().toLocaleTimeString('ko-KR', { hour: '2-digit', minute: '2-digit' });
}

function addMsg(text, type) {
  const area = document.getElementById('chat-area');
  const div = document.createElement('div');
  div.className = 'msg ' + type;
  div.innerHTML = `<div class="bubble">${text.replace(/\n/g,'<br>')}</div><div class="msg-time">${getTime()}</div>`;
  area.appendChild(div);
  area.scrollTop = area.scrollHeight;
}

function showTyping() {
  const area = document.getElementById('chat-area');
  const div = document.createElement('div');
  div.id = 'typing-indicator';
  div.className = 'typing-wrap';
  div.innerHTML = `<div class="typing"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>`;
  area.appendChild(div);
  area.scrollTop = area.scrollHeight;
}

function hideTyping() {
  const t = document.getElementById('typing-indicator');
  if (t) t.remove();
}

async function callGroq(userMsg) {
  const messages = [
    { role: 'system', content: systemPrompt },
    ...history,
    { role: 'user', content: userMsg }
  ];
  const res = await fetch('https://api.groq.com/openai/v1/chat/completions', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'Authorization': `Bearer ${apiKey}`
    },
    body: JSON.stringify({
      model: 'llama-3.3-70b-versatile',
      messages,
      max_tokens: 300,
      temperature: 0.9
    })
  });
  const data = await res.json();
  if (!res.ok) {
    const code = data.error?.code || res.status;
    const msg = data.error?.message || '알 수 없는 오류';
    throw new Error(`[${code}] ${msg}`);
  }
  return data.choices[0].message.content;
}

async function startChat() {
  const key = document.getElementById('api-key-input').value.trim();
  const errBox = document.getElementById('setup-err');
  errBox.style.display = 'none';

  if (!key) {
    errBox.textContent = 'API 키를 입력해주세요.';
    errBox.style.display = 'block';
    return;
  }
  if (!key.startsWith('gsk_')) {
    errBox.textContent = 'API 키 형식이 올바르지 않아요. gsk_...로 시작하는 키를 입력해주세요.';
    errBox.style.display = 'block';
    return;
  }

  apiKey = key;
  document.getElementById('setup-screen').style.display = 'none';
  const cs = document.getElementById('chat-screen');
  cs.style.display = 'flex';

  showTyping();
  try {
    const reply = await callGroq('안녕하세요! 처음 만나는 사람과 대화할 수 있게 도와주는 AI 코치로서 따뜻하게 첫 인사를 해주고, 상대방의 관심사가 무엇인지 또는 어떤 상황인지 물어봐주세요.');
    hideTyping();
    addMsg(reply, 'bot');
    history.push(
      { role: 'user', content: '안녕하세요! 처음 만나는 사람과 대화할 수 있게 도와주는 AI 코치로서 따뜻하게 첫 인사를 해주고, 상대방의 관심사가 무엇인지 또는 어떤 상황인지 물어봐주세요.' },
      { role: 'assistant', content: reply }
    );
  } catch (e) {
    hideTyping();
    addMsg('⚠️ 오류: ' + e.message + '\n\nAPI 키를 확인하거나 재설정 버튼을 눌러주세요.', 'error');
  }
}

async function sendMsg() {
  const input = document.getElementById('msg-input');
  const btn = document.getElementById('send-btn');
  const text = input.value.trim();
  if (!text || btn.disabled) return;

  input.value = '';
  btn.disabled = true;
  addMsg(text, 'user');
  history.push({ role: 'user', content: text });

  showTyping();
  try {
    const reply = await callGroq(text);
    hideTyping();
    addMsg(reply, 'bot');
    history.push({ role: 'assistant', content: reply });
  } catch (e) {
    hideTyping();
    addMsg('⚠️ 오류: ' + e.message, 'error');
  }

  btn.disabled = false;
  input.focus();
}

function quickAsk(text) {
  const input = document.getElementById('msg-input');
  input.value = text;
  sendMsg();
}
